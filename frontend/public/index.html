<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinVid — Pinterest Video Scraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07090F;
      --surface: #0e1117;
      --surface2: #161b27;
      --border: #1e2535;
      --mint: #00F5A0;
      --cyan: #00D4FF;
      --red: #E8445A;
      --text: #e8ecf4;
      --muted: #5a6480;
      --card-bg: #0d1119;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* ── HEADER ── */
    header {
      padding: 28px 40px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(7,9,15,0.92);
      backdrop-filter: blur(20px);
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--mint), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span {
      color: var(--muted);
      -webkit-text-fill-color: var(--muted);
      font-weight: 400;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cache-count {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* ── SEARCH BAR ── */
    .search-wrap {
      padding: 32px 40px 0;
      max-width: 700px;
    }

    .search-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder { color: var(--muted); }

    .search-input:focus {
      border-color: var(--mint);
      box-shadow: 0 0 0 3px rgba(0,245,160,0.08);
    }

    .btn {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.02em;
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--mint), var(--cyan));
      color: #07090F;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,245,160,0.25);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ── TABS / STATUS ── */
    .status-bar {
      padding: 20px 40px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .status-text {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .status-text strong { color: var(--mint); }

    .pill-tabs {
      display: flex;
      gap: 6px;
    }

    .pill {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .pill.active, .pill:hover {
      border-color: var(--mint);
      color: var(--mint);
      background: rgba(0,245,160,0.06);
    }

    /* ── LOADING ── */
    .loading-wrap {
      padding: 80px 40px;
      text-align: center;
      display: none;
    }

    .loading-wrap.show { display: block; }

    .spinner {
      width: 44px;
      height: 44px;
      border: 2.5px solid var(--border);
      border-top-color: var(--mint);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── EMPTY STATE ── */
    .empty {
      padding: 80px 40px;
      text-align: center;
      display: none;
    }

    .empty.show { display: block; }

    .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }

    .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--muted);
    }

    .empty-sub { font-size: 0.85rem; color: var(--muted); opacity: 0.7; }

    /* ── GRID ── */
    .grid-wrap {
      padding: 28px 40px 60px;
    }

    .grid {
      columns: 5 220px;
      column-gap: 14px;
    }

    /* ── CARD ── */
    .card {
      break-inside: avoid;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 14px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(0,245,160,0.3);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,245,160,0.1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--surface2);
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .card:hover .card-thumb img { transform: scale(1.04); }

    .play-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border-radius: 8px;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      color: var(--mint);
      letter-spacing: 0.05em;
    }

    .play-icon {
      width: 14px;
      height: 14px;
      background: var(--mint);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-icon::after {
      content: '';
      border-left: 5px solid #07090F;
      border-top: 3px solid transparent;
      border-bottom: 3px solid transparent;
      margin-left: 1.5px;
    }

    .card-body {
      padding: 12px 14px 14px;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-author {
      font-size: 0.72rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      color: var(--cyan);
      text-decoration: none;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .card-link:hover { color: var(--mint); }

    /* ── SKELETON ── */
    .skeleton-grid {
      columns: 5 220px;
      column-gap: 14px;
      padding: 28px 40px;
      display: none;
    }

    .skeleton-grid.show { display: block; }

    .skeleton-card {
      break-inside: avoid;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .skeleton-thumb {
      width: 100%;
      background: var(--surface2);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .skeleton-line {
      height: 10px;
      background: var(--surface2);
      border-radius: 6px;
      animation: pulse 1.5s ease-in-out infinite;
      margin: 10px 14px;
    }

    .skeleton-line.short { width: 55%; margin-bottom: 14px; }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 0.83rem;
      color: var(--text);
      z-index: 1000;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 320px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success { border-color: var(--mint); }
    .toast.error { border-color: var(--red); }

    /* ── CATEGORIES ── */
    .categories-wrap {
      padding: 16px 40px 0;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      max-width: 100%;
    }

    .categories-wrap::-webkit-scrollbar {
      display: none;
    }

    .cat-pill {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .cat-pill:hover {
      border-color: var(--mint);
      color: var(--mint);
      background: rgba(0,245,160,0.06);
      transform: translateY(-1px);
    }

    .cat-pill.active {
      background: linear-gradient(135deg, var(--mint), var(--cyan));
      color: #07090F;
      border-color: transparent;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      header, .search-wrap, .status-bar, .grid-wrap, .categories-wrap { padding-left: 20px; padding-right: 20px; }
      .logo { font-size: 1.2rem; }
      .grid, .skeleton-grid { columns: 2 160px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Pin<span>Vid</span></div>
  <div class="header-right">
    <span class="cache-count" id="cacheCount">0 cached</span>
    <button class="btn btn-ghost" onclick="loadRandom()">↻ Refresh</button>
  </div>
</header>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-label">Search Pinterest Video Pins</div>
  <div class="search-row">
    <input
      class="search-input"
      id="searchInput"
      type="text"
      placeholder="e.g. aesthetic room, cooking, travel vlog..."
      autocomplete="off"
    />
    <button class="btn btn-primary" onclick="doSearch()">Search</button>
  </div>
</div>

<!-- CATEGORIES -->
<div class="categories-wrap" id="categoriesWrap"></div>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="status-text" id="statusText">Loading trending video pins...</div>
  <div class="pill-tabs">
    <button class="pill active" id="tab-live" onclick="setTab('live')">Live</button>
    <button class="pill" id="tab-cached" onclick="setTab('cached')">Cached</button>
  </div>
</div>

<!-- SKELETON -->
<div class="skeleton-grid show" id="skeleton">
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:260px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:320px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:200px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:280px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:310px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:240px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:290px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:350px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:220px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:270px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:300px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:230px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:260px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:340px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb" style="height:210px"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
</div>

<!-- LOADING -->
<div class="loading-wrap" id="loadingWrap">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">SCRAPING PINTEREST...</div>
</div>

<!-- EMPTY -->
<div class="empty" id="emptyState">
  <div class="empty-icon">📌</div>
  <div class="empty-title">No video pins found</div>
  <div class="empty-sub">Try a different search term or refresh</div>
</div>

<!-- GRID -->
<div class="grid-wrap" id="gridWrap" style="display:none">
  <div class="grid" id="pinsGrid"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:3001/api';
  let currentTab = 'live';

  const CATEGORIES = [
    "Aesthetic Room", "Healthy Recipes", "Travel Vlog", "Digital Art", 
    "Street Style", "Nature Photography", "Tech Gadgets", "Workout Tips", 
    "DIY Crafts", "Space Exploration", "Retro Vibes", "Urban Architecture", 
    "Cozy Coffee", "Futuristic Tech", "Gaming Setup", "Minimalist Living",
    "Skincare Routine", "Home Office", "Calisthenics", "Lo-fi Beats"
  ];

  // ── UTILS ──────────────────────────────────────────────────────────────

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  function setStatus(msg) {
    document.getElementById('statusText').innerHTML = msg;
  }

  function setTab(tab) {
    currentTab = tab;
    document.getElementById('tab-live').classList.toggle('active', tab === 'live');
    document.getElementById('tab-cached').classList.toggle('active', tab === 'cached');
    if (tab === 'cached') loadCached();
    else loadRandom();
  }

  function showSkeleton() {
    document.getElementById('skeleton').classList.add('show');
    document.getElementById('loadingWrap').classList.remove('show');
    document.getElementById('gridWrap').style.display = 'none';
    document.getElementById('emptyState').classList.remove('show');
  }

  function showLoading(text = 'SCRAPING PINTEREST...') {
    document.getElementById('skeleton').classList.remove('show');
    document.getElementById('loadingWrap').classList.add('show');
    document.getElementById('loadingText').textContent = text;
    document.getElementById('gridWrap').style.display = 'none';
    document.getElementById('emptyState').classList.remove('show');
  }

  function showEmpty() {
    document.getElementById('skeleton').classList.remove('show');
    document.getElementById('loadingWrap').classList.remove('show');
    document.getElementById('gridWrap').style.display = 'none';
    document.getElementById('emptyState').classList.add('show');
  }

  function showGrid() {
    document.getElementById('skeleton').classList.remove('show');
    document.getElementById('loadingWrap').classList.remove('show');
    document.getElementById('emptyState').classList.remove('show');
    document.getElementById('gridWrap').style.display = 'block';
  }

  // ── CATEGORIES ─────────────────────────────────────────────────────────

  function renderCategories() {
    const wrap = document.getElementById('categoriesWrap');
    // Pick 15 random categories from the pool
    const shuffled = [...CATEGORIES].sort(() => 0.5 - Math.random());
    const selected = shuffled.slice(0, 15);
    
    wrap.innerHTML = selected.map(cat => `
      <button class="cat-pill" onclick="handleCategoryClick(this, '${cat}')">${cat}</button>
    `).join('');
  }

  function handleCategoryClick(el, cat) {
    document.getElementById('searchInput').value = cat;
    
    // Highlight active pill
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    
    doSearch();
  }

  // ── CARD BUILDER ────────────────────────────────────────────────────────

  function buildCard(pin, delay = 0) {
    const div = document.createElement('div');
    div.className = 'card';
    div.style.animationDelay = `${delay}ms`;

    const title = pin.title || 'Pinterest Video Pin';
    const author = pin.author ? `@${pin.author}` : 'Pinterest';
    const thumb = pin.thumbnail || 'https://via.placeholder.com/220x300/0d1119/5a6480?text=No+Image';

    div.innerHTML = `
      <div class="card-thumb">
        <img src="${thumb}" alt="${title}" loading="lazy" onerror="this.src='https://via.placeholder.com/220x300/0d1119/5a6480?text=📌'"/>
        <div class="play-badge"><div class="play-icon"></div>VIDEO</div>
      </div>
      <div class="card-body">
        <div class="card-title">${title || 'Untitled Pin'}</div>
        <div class="card-meta">
          <span class="card-author">${author}</span>
          <a class="card-link" href="${pin.pinUrl}" target="_blank" rel="noopener">
            View ↗
          </a>
        </div>
      </div>
    `;
    return div;
  }

  function renderPins(pins, append = false) {
    const grid = document.getElementById('pinsGrid');
    if (!append) grid.innerHTML = '';
    
    if (!pins || pins.length === 0) { 
      if (!append) showEmpty(); 
      return; 
    }

    pins.forEach((pin, i) => {
      grid.appendChild(buildCard(pin, i * 30));
    });

    showGrid();
  }

  // ── INFINITE SCROLL ─────────────────────────────────────────────────────

  let isLoadingMore = false;
  window.addEventListener('scroll', () => {
    if (isLoadingMore || currentTab === 'cached') return;
    
    const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
    if (scrollTop + clientHeight >= scrollHeight - 800) {
      loadMore();
    }
  });

  async function loadMore() {
    if (isLoadingMore) return;
    isLoadingMore = true;
    
    // Show a small loader at bottom or just toast
    toast('Loading more pins...', 'info');
    
    try {
      const q = document.getElementById('searchInput').value.trim();
      let url = q ? `${API}/pins/search?q=${encodeURIComponent(q)}` : `${API}/pins/random`;
      
      const res = await fetch(url);
      const data = await res.json();
      
      if (data.success && data.pins.length > 0) {
        renderPins(data.pins, true);
        updateCacheCount();
      }
    } catch (err) {
      console.error('Failed to load more:', err);
    } finally {
      isLoadingMore = false;
    }
  }

  // ── API CALLS ───────────────────────────────────────────────────────────

  async function loadRandom() {
    showSkeleton();
    setStatus('Scraping trending video pins...');
    try {
      const res = await fetch(`${API}/pins/random`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error);

      renderPins(data.pins);
      setStatus(`Found <strong>${data.count}</strong> video pins — trending`);
      updateCacheCount();
      toast(`✓ Loaded ${data.count} video pins`);
    } catch (err) {
      showEmpty();
      setStatus('Failed to scrape Pinterest');
      toast(`Error: ${err.message}`, 'error');
      console.error(err);
    }
  }

  async function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) { toast('Enter a search term first', 'error'); return; }

    showLoading(`SEARCHING "${q.toUpperCase()}"...`);
    setStatus(`Searching for "<strong>${q}</strong>"...`);

    try {
      const res = await fetch(`${API}/pins/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error);

      renderPins(data.pins);
      setStatus(`<strong>${data.count}</strong> video pins for "<strong>${q}</strong>" — live + cached`);
      updateCacheCount();
      toast(`✓ ${data.count} results for "${q}"`);
    } catch (err) {
      showEmpty();
      setStatus('Search failed');
      toast(`Error: ${err.message}`, 'error');
    }
  }

  async function loadCached() {
    showLoading('LOADING CACHE...');
    try {
      const res = await fetch(`${API}/pins/cached`);
      const data = await res.json();
      renderPins(data.pins);
      setStatus(`<strong>${data.count}</strong> cached video pins`);
      toast(`Showing ${data.count} cached pins`);
    } catch (err) {
      showEmpty();
      toast('Failed to load cache', 'error');
    }
  }

  async function updateCacheCount() {
    try {
      const res = await fetch(`${API}/pins/cached`);
      const data = await res.json();
      document.getElementById('cacheCount').textContent = `${data.count} cached`;
    } catch {}
  }

  // ── KEYBOARD SHORTCUT ───────────────────────────────────────────────────

  document.getElementById('searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      // Clear active category highlight on manual search
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      doSearch();
    }
  });

  // ── INIT ────────────────────────────────────────────────────────────────
  renderCategories();
  loadRandom();
  updateCacheCount();
</script>
</body>
</html>
